<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <!-- Start block--modifier -->
    <div class="container">
      <div class="btn--container">
        <button href="" class="btn btn--success btn--disable btn--sm">
          GO TO NEXT APPROVAL
        </button>
        <button href="" class="btn btn--warn btn--sm">OK</button>
        <button href="" class="btn btn--danger btn--sm">TRY AGAIN</button>
      </div>

      <div class="btn--container">
        <button href="" class="btn btn--success btn--disable">
          GO TO NEXT APPROVAL
        </button>
        <button href="" class="btn btn--warn">OK</button>
        <button href="" class="btn btn--danger">TRY AGAIN</button>
      </div>

      <div class="btn--container">
        <button href="" class="btn btn--success btn--disable btn--lg">
          GO TO NEXT APPROVAL
        </button>
        <button href="" class="btn btn--warn btn--lg">OK</button>
        <button href="" class="btn btn--danger btn--lg">TRY AGAIN</button>
      </div>
    </div>
    <!-- End block--modifier -->

    <!-- Start block__element--modifier -->
    <div class="container">
      <!-- Success Message -->
      <div class="btn--container toast toast--success">
        <div class="toast__icon"><i class="fa-solid fa-circle-check"></i></div>
        <div class="toast__body">
          <h3 class="toast__body__title">Success</h3>
          <p class="toast__body__msg">
            Anyone with access can view your invited visitors.
          </p>
        </div>
        <div class="toast__close"><i class="fa-solid fa-xmark"></i></div>
      </div>

      <!-- Info Message -->
      <div class="btn--container toast toast--info">
        <div class="toast__icon">
          <i class="fa-solid fa-circle-info"></i>
        </div>
        <div class="toast__body">
          <h3 class="toast__body__title">Success</h3>
          <p class="toast__body__msg">
            Anyone with access can view your invited visitors.
          </p>
        </div>
        <div class="toast__close"><i class="fa-solid fa-xmark"></i></div>
      </div>

      <!-- Warning Message -->
      <div class="btn--container toast toast--warn">
        <div class="toast__icon">
          <i class="fa-solid fa-circle-exclamation"></i>
        </div>
        <div class="toast__body">
          <h3 class="toast__body__title">Success</h3>
          <p class="toast__body__msg">
            Anyone with access can view your invited visitors.
          </p>
        </div>
        <div class="toast__close"><i class="fa-solid fa-xmark"></i></div>
      </div>

      <!-- Error Message -->
      <div class="btn--container toast toast--error">
        <div class="toast__icon">
          <i class="fa-solid fa-circle-xmark"></i>
        </div>
        <div class="toast__body">
          <h3 class="toast__body__title">Success</h3>
          <p class="toast__body__msg">
            Anyone with access can view your invited visitors.
          </p>
        </div>
        <div class="toast__close"><i class="fa-solid fa-xmark"></i></div>
      </div>
    </div>
  </body>
</html>
